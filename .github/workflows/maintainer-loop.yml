name: Maintainer Loop
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      NEXUS_REMOTE_RELEASE_MODE: live
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run upstream:check
      - run: bun run maintainer:check
      - name: Upload maintainer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-status
          path: |
            upstream-notes/maintainer-status.json
            upstream-notes/maintainer-status.md
      - name: Workflow boundary note
        if: always()
        run: |
          echo "Maintainer workflow logs and uploaded artifacts are notification surfaces only."
          echo "This workflow does not define repository truth."
