name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run test

      - name: Typecheck
        run: |
          if [ -f tsconfig.json ]; then
            bunx tsc --noEmit
          else
            echo "Skipping tsc --noEmit: no tsconfig.json is present yet."
          fi
